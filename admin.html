<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Admin Login</h2>
<form id="loginForm">
  <input type="text" id="username" placeholder="Username" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit">Login</button>
</form>

<div id="dashboard" style="display:none;">
  <h2>Dashboard</h2>

  <form id="addProductForm">
    <input type="text" id="productName" placeholder="Product/Property Name" required>
    <input type="text" id="productPrice" placeholder="Price" required>
    <select id="productType" required>
      <option value="phone">Phone/Accessory</option>
      <option value="estate">Estate/Property</option>
    </select>
    <input type="file" id="productFile" accept="image/*,video/*" required>
    <button type="submit">Add Item</button>
  </form>

  <ul id="productList"></ul>
  <button id="logoutBtn">Logout</button>
</div>

<!-- Link to separate JS file -->
<script src="admin.js"></script>

</body>
</html>
